<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Generador de códigos QR profesional y personalizable. Crea QR con logotipos, colores y degradados.">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>QR Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    const {useState,useEffect,useRef,useCallback} = React;

    // --- Utility functions ---
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function drawRoundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    const DATA_TYPES = [
      {id:'url',label:'🔗 URL',icon:'🔗'},
      {id:'text',label:'📝 Texto',icon:'📝'},
      {id:'wifi',label:'📶 WiFi',icon:'📶'},
      {id:'vcard',label:'👤 Contacto',icon:'👤'},
      {id:'whatsapp',label:'💬 WhatsApp',icon:'💬'},
      {id:'email',label:'📧 Email',icon:'📧'}
    ];

    const DOT_STYLES = ['rounded','dots','classy','classy-rounded','square','extra-rounded'];
    const CORNER_STYLES = ['dot','square','extra-rounded'];
    const CORNER_DOT_STYLES = ['dot','square'];

    function buildQRData(type, fields) {
      switch(type) {
        case 'url': return fields.url || 'https://example.com';
        case 'text': return fields.text || 'Hola Mundo';
        case 'wifi':
          return `WIFI:T:${fields.wifiSecurity||'WPA'};S:${fields.wifiSSID||''};P:${fields.wifiPassword||''};;`;
        case 'vcard':
          return `BEGIN:VCARD\nVERSION:3.0\nFN:${fields.vcName||''}\nTEL:${fields.vcPhone||''}\nEMAIL:${fields.vcEmail||''}\nORG:${fields.vcOrg||''}\nEND:VCARD`;
        case 'whatsapp':
          return `https://wa.me/${(fields.waPhone||'').replace(/\D/g,'')}?text=${encodeURIComponent(fields.waMessage||'')}`;
        case 'email':
          return `mailto:${fields.emAddr||''}?subject=${encodeURIComponent(fields.emSubject||'')}&body=${encodeURIComponent(fields.emBody||'')}`;
        default: return 'https://example.com';
      }
    }

    function Section({title,icon,children,defaultOpen=true}) {
      const [open,setOpen] = useState(defaultOpen);
      return React.createElement('div',{className:'form-group'},
        React.createElement('button',{className:'section-toggle',onClick:()=>setOpen(!open)},
          React.createElement('span',null,icon,' ',title),
          React.createElement('span',{className:'arrow'+(open?' open':'')},open?'▲':'▼')
        ),
        React.createElement('div',{className:'section-content',style:{maxHeight:open?'2000px':'0',overflow:'hidden'}},children)
      );
    }

    function ColorPicker({label,value,onChange}) {
      return React.createElement('div',{className:'form-group'},
        label && React.createElement('label',null,label),
        React.createElement('div',{className:'color-row'},
          React.createElement('div',{className:'color-swatch'},
            React.createElement('input',{type:'color',value:value,onChange:e=>onChange(e.target.value)})
          ),
          React.createElement('input',{className:'color-hex',value:value,onChange:e=>onChange(e.target.value),maxLength:7})
        )
      );
    }

    function App() {
      const [dataType,setDataType] = useState('url');
      const [fields,setFields] = useState({url:'https://www.climaster.uy'});
      const [dotType,setDotType] = useState('rounded');
      const [dotColor,setDotColor] = useState('#6366f1');
      const [bgColor,setBgColor] = useState('#ffffff');
      const [cornerType,setCornerType] = useState('extra-rounded');
      const [cornerColor,setCornerColor] = useState('#4f46e5');
      const [cornerDotType,setCornerDotType] = useState('dot');
      const [cornerDotColor,setCornerDotColor] = useState('#7c3aed');
      const [logoSrc,setLogoSrc] = useState('');
      const [logoSize,setLogoSize] = useState(0.35);
      const [logoMargin,setLogoMargin] = useState(5);
      const [hideBgDots,setHideBgDots] = useState(true);
      const [qrSize,setQrSize] = useState(280);
      const [stickerText,setStickerText] = useState('');
      const [stickerPos,setStickerPos] = useState('bottom');
      const [stickerFontSize,setStickerFontSize] = useState(18);
      const [stickerColor,setStickerColor] = useState('#1e293b');
      const [stickerFont,setStickerFont] = useState('Outfit');
      const [scannerOpen,setScannerOpen] = useState(false);
      const [scannerResult,setScannerResult] = useState(null);
      const [historyItems,setHistoryItems] = useState([]);
      const [customFontName,setCustomFontName] = useState('');
      const [customFontSrc,setCustomFontSrc] = useState('');
      const [stickerBgEnabled,setStickerBgEnabled] = useState(false);
      const [stickerBgColor,setStickerBgColor] = useState('#000000');
      const [stickerBgOpacity,setStickerBgOpacity] = useState(0.3);
      const [stickerPadding,setStickerPadding] = useState(8);
      const [stickerBorderRadius,setStickerBorderRadius] = useState(6);
      const [dlFormat,setDlFormat] = useState('png');
      const [toast,setToast] = useState('');
      const [installPrompt,setInstallPrompt] = useState(null);
      const [showInstall,setShowInstall] = useState(false);

      const qrInstance = useRef(null);
      const containerRef = useRef(null);

      const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),2500); };

      const updateField = (key,val) => setFields(prev=>({...prev,[key]:val}));

      // History management
      const loadHistory = () => {
        try {
          const saved = localStorage.getItem('qrHistory');
          if (saved) setHistoryItems(JSON.parse(saved));
        } catch(e) { /* ignore */ }
      };

      useEffect(loadHistory, []);

      const saveToHistory = (thumbnailDataUrl) => {
        const entry = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2,4),
          timestamp: new Date().toISOString(),
          dataType, fields: {...fields},
          dotType, dotColor, bgColor,
          cornerType, cornerColor, cornerDotType, cornerDotColor,
          logoSrc: logoSrc || '',
          logoSize, logoMargin, hideBgDots, qrSize,
          stickerText: stickerText || '',
          stickerLines: stickerText ? stickerText.split('\n') : [''],
          stickerPos, stickerFontSize, stickerColor, stickerFont,
          customFontName, customFontSrc,
          stickerBgEnabled, stickerBgColor, stickerBgOpacity,
          stickerPadding, stickerBorderRadius,
          thumbnail: thumbnailDataUrl || ''
        };
        const updated = [entry, ...historyItems].slice(0, 50);
        setHistoryItems(updated);
        try {
          localStorage.setItem('qrHistory', JSON.stringify(updated));
        } catch(e) {
          // If storage full, remove thumbnail data and try again
          try {
            const stripped = updated.map((e,i) => i === 0 ? {...e, thumbnail: ''} : e);
            localStorage.setItem('qrHistory', JSON.stringify(stripped));
            setHistoryItems(stripped);
          } catch(e2) { /* ignore */ }
        }
      };

      const deleteHistoryEntry = (id) => {
        const updated = historyItems.filter(e => e.id !== id);
        setHistoryItems(updated);
        localStorage.setItem('qrHistory', JSON.stringify(updated));
      };

      const clearHistory = () => {
        setHistoryItems([]);
        localStorage.removeItem('qrHistory');
      };

      const restoreHistoryEntry = (entry) => {
        setDataType(entry.dataType);
        setFields(entry.fields || {});
        setDotType(entry.dotType);
        setDotColor(entry.dotColor);
        setBgColor(entry.bgColor);
        setCornerType(entry.cornerType);
        setCornerColor(entry.cornerColor);
        setCornerDotType(entry.cornerDotType);
        setCornerDotColor(entry.cornerDotColor);
        if (entry.logoSrc) setLogoSrc(entry.logoSrc);
        setLogoSize(entry.logoSize);
        setLogoMargin(entry.logoMargin);
        setHideBgDots(entry.hideBgDots);
        setQrSize(entry.qrSize);
        setStickerText(entry.stickerText || '');
        setStickerPos(entry.stickerPos);
        setStickerFontSize(entry.stickerFontSize);
        setStickerColor(entry.stickerColor);
        setStickerFont(entry.stickerFont);
        if (entry.customFontName) {
          setCustomFontName(entry.customFontName);
          setCustomFontSrc(entry.customFontSrc);
        }
        setStickerBgEnabled(entry.stickerBgEnabled || false);
        setStickerBgColor(entry.stickerBgColor || '#000000');
        setStickerBgOpacity(entry.stickerBgOpacity || 0.3);
        setStickerPadding(entry.stickerPadding || 8);
        setStickerBorderRadius(entry.stickerBorderRadius || 6);
        showToast('🔄 Configuración restaurada');
        // Scroll to top of left panel
        const panel = document.querySelector('.panel');
        if (panel) panel.scrollTop = 0;
      };

      // QR Scanner
      const handleScanUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: 'dontInvert'
            });
            if (code && code.data) {
              setScannerResult(code.data);
              showToast('✅ QR detectado: '+code.data.slice(0,40)+(code.data.length>40?'...':''));
            } else {
              // Try with inversion
              const code2 = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: 'attemptBoth'
              });
              if (code2 && code2.data) {
                setScannerResult(code2.data);
                showToast('✅ QR detectado: '+code2.data.slice(0,40)+(code2.data.length>40?'...':''));
              } else {
                setScannerResult(null);
                showToast('❌ No se pudo decodificar el QR en la imagen');
              }
            }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const fillFromScanner = () => {
        if (!scannerResult) return;
        // Detect type and fill
        const val = scannerResult;
        if (val.startsWith('http://') || val.startsWith('https://')) {
          setDataType('url');
          setFields(prev => ({...prev, url: val}));
        } else if (val.startsWith('mailto:')) {
          setDataType('email');
          const addr = val.replace('mailto:', '').split('?')[0];
          const params = new URLSearchParams(val.split('?')[1] || '');
          setFields(prev => ({
            ...prev,
            emAddr: addr,
            emSubject: params.get('subject') || '',
            emBody: params.get('body') || ''
          }));
        } else if (val.startsWith('WIFI:')) {
          setDataType('wifi');
          const ssid = (val.match(/S:([^;]*)/) || ['',''])[1];
          const pwd = (val.match(/P:([^;]*)/) || ['',''])[1];
          const sec = (val.match(/T:([^;]*)/) || ['','WPA'])[1];
          setFields(prev => ({...prev, wifiSSID: ssid, wifiPassword: pwd, wifiSecurity: sec}));
        } else if (val.startsWith('BEGIN:VCARD')) {
          setDataType('vcard');
          const name = (val.match(/FN:([^\n]*)/) || ['',''])[1];
          const tel = (val.match(/TEL:([^\n]*)/) || ['',''])[1];
          const email = (val.match(/EMAIL:([^\n]*)/) || ['',''])[1];
          const org = (val.match(/ORG:([^\n]*)/) || ['',''])[1];
          setFields(prev => ({...prev, vcName: name, vcPhone: tel, vcEmail: email, vcOrg: org}));
        } else if (val.startsWith('https://wa.me/')) {
          setDataType('whatsapp');
          const phone = val.match(/wa\.me\/([^?]*)/);
          const msg = val.match(/text=([^&]*)/);
          setFields(prev => ({
            ...prev,
            waPhone: phone ? phone[1] : '',
            waMessage: msg ? decodeURIComponent(msg[1]) : ''
          }));
        } else {
          setDataType('text');
          setFields(prev => ({...prev, text: val}));
        }
        setScannerOpen(false);
        showToast('✅ Datos del QR aplicados al formulario');
      };

      // PWA Install
      useEffect(()=>{
        if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
        const handler = e=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true);};
        window.addEventListener('beforeinstallprompt',handler);
        return ()=>window.removeEventListener('beforeinstallprompt',handler);
      },[]);

      const handleInstall = async()=>{
        if(!installPrompt)return;
        installPrompt.prompt();
        const result=await installPrompt.userChoice;
        if(result.outcome==='accepted')showToast('✅ App instalada');
        setShowInstall(false);setInstallPrompt(null);
      };

      // QR creation & updates
      useEffect(()=>{
        const qr = new QRCodeStyling({width:qrSize,height:qrSize,data:buildQRData(dataType,fields),
          type:'canvas',
          dotsOptions:{color:dotColor,type:dotType},
          backgroundOptions:{color:bgColor},
          cornersSquareOptions:{type:cornerType,color:cornerColor},
          cornersDotOptions:{type:cornerDotType,color:cornerDotColor},
          imageOptions:{crossOrigin:'anonymous',margin:logoMargin,imageSize:logoSize,hideBackgroundDots:hideBgDots},
          image:logoSrc||undefined,
          qrOptions:{errorCorrectionLevel:'H'}
        });
        qrInstance.current = qr;
        if(containerRef.current){containerRef.current.innerHTML='';qr.append(containerRef.current);}
      },[dataType,fields,dotType,dotColor,bgColor,cornerType,cornerColor,cornerDotType,cornerDotColor,logoSrc,logoSize,logoMargin,hideBgDots,qrSize]);

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if(!file)return;
        const reader = new FileReader();
        reader.onload = ev => setLogoSrc(ev.target.result);
        reader.readAsDataURL(file);
      };

      const handleFontUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const validExts = ['.ttf','.otf','.woff','.woff2'];
        const ext = '.' + file.name.split('.').pop().toLowerCase();
        if (!validExts.includes(ext)) {
          showToast('❌ Formato no soportado. Usa .ttf, .otf, .woff o .woff2');
          return;
        }
        const fontName = file.name.replace(/\.[^/.]+$/, '');
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const dataUrl = ev.target.result;
          try {
            const fontFace = new FontFace(fontName, `url(${dataUrl})`);
            await fontFace.load();
            document.fonts.add(fontFace);
            setCustomFontName(fontName);
            setCustomFontSrc(dataUrl);
            setStickerFont(fontName);
            showToast('✅ Fuente "'+fontName+'" cargada');
          } catch(err) {
            showToast('❌ Error al cargar la fuente');
          }
        };
        reader.readAsDataURL(file);
      };

      const drawStickerTextBlock = (ctx, textBlock, cx, yStart) => {
        const lines = textBlock.split('\n').filter(l => l.trim().length > 0);
        if (lines.length === 0) return lines.length;
        const lineH = Math.round(stickerFontSize * 1.3);
        const blockH = lines.length * lineH;
        ctx.font = `bold ${stickerFontSize}px ${stickerFont}, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = stickerColor;

        // Draw background if enabled (single rounded rect for entire block)
        if (stickerBgEnabled) {
          let maxWidth = 0;
          lines.forEach(line => {
            const w = ctx.measureText(line).width;
            if (w > maxWidth) maxWidth = w;
          });
          const bgLeft = cx - maxWidth / 2 - stickerPadding;
          const bgTop = yStart - stickerFontSize * 0.85 - stickerPadding;
          const bgWidth = maxWidth + stickerPadding * 2;
          const bgHeight = blockH + stickerPadding * 2;
          ctx.fillStyle = hexToRgba(stickerBgColor, stickerBgOpacity);
          ctx.save();
          drawRoundRect(ctx, bgLeft, bgTop, bgWidth, bgHeight, stickerBorderRadius);
          ctx.restore();
          ctx.fillStyle = stickerColor;
          ctx.font = `bold ${stickerFontSize}px ${stickerFont}, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
        }

        // Draw each line
        lines.forEach((line, i) => {
          ctx.fillText(line, cx, yStart + i * lineH);
        });

        return lines.length;
      };

      const countStickerLines = (text) => {
        return text.split('\n').filter(l => l.trim().length > 0).length;
      };

      const renderStickerToCanvas = (img) => {
        const rem = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
        const pad = Math.round(1.5 * rem);
        const gap = Math.round(0.6 * rem);
        const lineH = Math.round(stickerFontSize * 1.3);
        const numLines = stickerText.trim() ? countStickerLines(stickerText) : 0;
        const blockH = numLines * lineH;

        let qrY = pad;
        let totalH = img.height + pad * 2;
        if ((stickerPos === 'top' || stickerPos === 'both') && numLines > 0) totalH += blockH + gap;
        if ((stickerPos === 'bottom' || stickerPos === 'both') && numLines > 0) totalH += gap + blockH;

        const canvas = document.createElement('canvas');
        canvas.width = img.width + pad * 2;
        canvas.height = totalH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if ((stickerPos === 'top' || stickerPos === 'both') && numLines > 0) {
          const numDrawn = drawStickerTextBlock(ctx, stickerText, canvas.width / 2, pad + stickerFontSize);
          qrY = pad + blockH + gap;
        }

        ctx.drawImage(img, pad, qrY);

        if ((stickerPos === 'bottom' || stickerPos === 'both') && numLines > 0) {
          const textY = qrY + img.height + gap + stickerFontSize;
          drawStickerTextBlock(ctx, stickerText, canvas.width / 2, textY);
        }

        return canvas;
      };

      const downloadQR = () => {
        if(!qrInstance.current) return;

        const hasSticker = stickerText.trim().length > 0;

        // Standard formats without sticker text use the library directly (except PDF)
        if (!hasSticker && dlFormat !== 'pdf') {
          qrInstance.current.download({name:'qr-studio',extension:dlFormat});
          // Save to history with a generated thumbnail
          generateThumbnailAndSave();
          showToast('⬇️ QR descargado');
          return;
        }

        // For sticker text or PDF, use canvas rendering
        qrInstance.current.getRawData('png').then(blob => {
          const reader = new FileReader();
          reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
              const canvas = renderStickerToCanvas(img);

              if (dlFormat === 'pdf') {
                try {
                  const { jsPDF } = window.jspdf;
                  const margin = 20;
                  const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'l' : 'p',
                    unit: 'px',
                    format: [canvas.width + margin * 2, canvas.height + margin * 2]
                  });
                  const imgData = canvas.toDataURL('image/png');
                  pdf.addImage(imgData, 'PNG', margin, margin, canvas.width, canvas.height);
                  pdf.save('qr-sticker.pdf');
                  showToast('⬇️ PDF descargado');
                } catch(e) {
                  showToast('❌ Error al generar PDF');
                }
              } else {
                const ext = dlFormat === 'pdf' ? 'png' : dlFormat;
                const mime = dlFormat === 'jpeg' ? 'jpeg' : 'png';
                const link = document.createElement('a');
                link.download = 'qr-sticker.' + ext;
                link.href = canvas.toDataURL('image/' + mime);
                link.click();
                showToast('⬇️ Sticker descargado' + (dlFormat === 'svg' ? ' (exportado como PNG)' : ''));
              }

              // Save to history with thumbnail
              const thumbCanvas = document.createElement('canvas');
              thumbCanvas.width = 70;
              thumbCanvas.height = 70;
              const tCtx = thumbCanvas.getContext('2d');
              tCtx.drawImage(img, 0, 0, 70, 70);
              saveToHistory(thumbCanvas.toDataURL('image/png'));
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(blob);
        });
      };

      const generateThumbnailAndSave = () => {
        qrInstance.current.getRawData('png').then(blob => {
          const reader = new FileReader();
          reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
              const thumbCanvas = document.createElement('canvas');
              thumbCanvas.width = 70;
              thumbCanvas.height = 70;
              const tCtx = thumbCanvas.getContext('2d');
              tCtx.drawImage(img, 0, 0, 70, 70);
              saveToHistory(thumbCanvas.toDataURL('image/png'));
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(blob);
        });
      };

      const shareQR = async()=>{
        if(!navigator.share||!qrInstance.current)return showToast('Compartir no soportado');
        try{
          const blob=await qrInstance.current.getRawData('png');
          const file=new File([blob],'qr-code.png',{type:'image/png'});
          await navigator.share({files:[file],title:'Mi QR Code'});
          showToast('✅ Compartido');
        }catch(e){showToast('Compartir cancelado');}
      };

      const copyToClipboard = async()=>{
        if(!qrInstance.current)return;
        try{
          const blob=await qrInstance.current.getRawData('png');
          await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
          showToast('📋 Copiado al portapapeles');
        }catch(e){showToast('Error al copiar');}
      };

      // --- Render data type fields ---
      function renderDataFields() {
        const inp = (key,label,placeholder,type='text') =>
          React.createElement('div',{className:'form-group',key:key},
            React.createElement('label',null,label),
            React.createElement('input',{className:'form-input',type,placeholder,value:fields[key]||'',onChange:e=>updateField(key,e.target.value)})
          );

        switch(dataType){
          case 'url': return inp('url','Dirección URL','https://www.ejemplo.com','url');
          case 'text': return inp('text','Texto','Escribe tu mensaje aquí...');
          case 'wifi': return React.createElement(React.Fragment,null,
            inp('wifiSSID','Nombre de Red (SSID)','Mi WiFi'),
            inp('wifiPassword','Contraseña','••••••••','password'),
            React.createElement('div',{className:'form-group'},
              React.createElement('label',null,'Seguridad'),
              React.createElement('select',{className:'form-select',value:fields.wifiSecurity||'WPA',onChange:e=>updateField('wifiSecurity',e.target.value)},
